name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    name: Build (lake)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build with Lake
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
