name: Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs (doc-gen4)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build library (with Mathlib cache)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true

      - name: Cache documentation build
        uses: actions/cache@v4
        with:
          path: docbuild/.lake
          key: docs-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}
          restore-keys: docs-${{ hashFiles('lean-toolchain') }}-

      - name: Generate API documentation
        working-directory: docbuild
        run: |
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update doc-gen4
          lake build HopfAlgebras:docs RoughPaths:docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
